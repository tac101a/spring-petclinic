version: '3.8'

services:
  # 1. Trái tim Hệ thống: Database
  postgres-server:
    image: postgres:15
    container_name: petclinic-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=petclinic
      - POSTGRES_PASSWORD=petclinic
      - POSTGRES_DB=petclinic
    volumes:
      - pgdata:/var/lib/postgresql/data # Gắn volume để không mất data khi container sập
    restart: unless-stopped

  # 2. Khối óc Hệ thống: Ứng dụng Spring Boot
  petclinic-app:
    # Trong môi trường Lab, bạn có thể build trực tiếp từ thư mục hiện tại
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: spring-petclinic
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      # ĐIỂM ĂN TIỀN: Gọi thẳng tên service 'postgres-server', không cần IP 10.0.0.5
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-server:5432/petclinic
      - SPRING_DATASOURCE_USERNAME=petclinic
      - SPRING_DATASOURCE_PASSWORD=petclinic
    volumes:
      - /opt/petclinic/logs:/app/logs # Mount log ra VM2 như bạn đã làm ở Jenkins
    depends_on:
      - postgres-server # Ép ứng dụng phải chờ DB đứng lên trước rồi mới chạy
    restart: unless-stopped

# Khai báo Volume cho Database
volumes:
  pgdata:
